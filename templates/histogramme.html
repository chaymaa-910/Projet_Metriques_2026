<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Histogramme météo</title>

    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <style>

        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #2563eb;
        }

        #chart_div {
            width: 100%;
            height: 600px;
            background: white;
            border-radius: 15px;
            padding: 15px;
        }

    </style>
</head>

<body>

    <h1>📊 Prévisions météo Paris</h1>

    <div id="chart_div"></div>

    <script>

        google.charts.load('current', { packages: ['corechart'] });

        google.charts.setOnLoadCallback(drawChart);

        async function drawChart() {

            const response = await fetch('/paris');

            const json = await response.json();

            const data = new google.visualization.DataTable();

            data.addColumn('string', 'Date');

            data.addColumn('number', 'Température');

            for (let i = 0; i < json.length; i += 24) {

                const jour = json[i];

                const date = jour.datetime.split('T')[0];

                const temperature = jour.temperature_c;

                data.addRow([date, temperature]);
            }

            const options = {
                title: 'Prévisions météo des 7 prochains jours',
                legend: { position: 'none' }
            };

            const chart = new google.visualization.ColumnChart(
                document.getElementById('chart_div')
            );

            chart.draw(data, options);
        }

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Contact</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {

            width: 420px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #2563eb;
            margin-bottom: 30px;
        }

        input,
        textarea {

            width: 100%;
            padding: 14px;
            margin-top: 10px;
            margin-bottom: 20px;

            border-radius: 10px;
            border: 1px solid #d1d5db;

            font-size: 16px;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        button {

            width: 100%;
            padding: 14px;

            border: none;
            border-radius: 10px;

            background: #2563eb;
            color: white;

            font-size: 16px;
            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {
            background: #1d4ed8;
            transform: scale(1.02);
        }

        p {
            text-align: center;
            color: #6b7280;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>📩 Contactez-moi</h1>

        <form>

            <input type="text" placeholder="Votre prénom">

            <input type="text" placeholder="Votre nom">

            <textarea placeholder="Votre message"></textarea>

            <button type="submit">
                Envoyer
            </button>

        </form>

        <p>
            Projet Flask • Chaymaa Salmi
        </p>

    </div>

</body>

</html>

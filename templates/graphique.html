<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Températures Paris — Google LineChart</title>

  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f4f6f9;
    }

    h1 {
      color: #2563eb;
      text-align: center;
    }

    #chart {
      width: 100%;
      height: 520px;
      background: white;
      border-radius: 12px;
      padding: 10px;
    }

    #status {
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>

<body>

  <h1>🌤 Températures horaires — Paris</h1>

  <div id="chart"></div>

  <div id="status"></div>

  <script>

    google.charts.load('current', { packages: ['corechart'] });

    google.charts.setOnLoadCallback(init);

    async function init() {

      const res = await fetch('/paris');

      const json = await res.json();

      const rows = json.map(p => {

        const [datePart, timePart] = p.datetime.split('T');

        const [y, m, d] = datePart.split('-').map(Number);

        const [hh, mm] = timePart.split(':').map(Number);

        return [
          new Date(y, m - 1, d, hh, mm),
          Number(p.temperature_c)
        ];
      });

      const data = new google.visualization.DataTable();

      data.addColumn('datetime', 'Date');

      data.addColumn('number', 'Température');

      data.addRows(rows);

      const options = {
        title: 'Température à Paris',
        legend: { position: 'bottom' },
        hAxis: {
          title: 'Date'
        },
        vAxis: {
          title: '°C'
        }
      };

      const chart = new google.visualization.LineChart(
        document.getElementById('chart')
      );

      chart.draw(data, options);

      document.getElementById('status').textContent =
        "✅ Données météo chargées avec succès";
    }

  </script>

</body>
</html>
